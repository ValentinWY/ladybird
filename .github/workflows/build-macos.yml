name: Build Ladybird (macOS arm64)

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ladybird-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 120

    env:
      BUILD_DIR: Build/release
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # Dependencies
      # ----------------------------
      - name: Install Homebrew deps
        run: |
          brew update
          brew install \
            autoconf autoconf-archive automake \
            ccache cmake libtool nasm ninja pkg-config \
            llvm@21

      - name: Setup Rust
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          source "$HOME/.cargo/env"
          rustup toolchain install stable --profile minimal
          rustup default stable

      # ----------------------------
      # 🔧 CRITICAL FIX 1: vcpkg
      # ----------------------------
      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$GITHUB_WORKSPACE/vcpkg"
          "$GITHUB_WORKSPACE/vcpkg/bootstrap-vcpkg.sh" -disableMetrics

      # ----------------------------
      # 🔧 CRITICAL FIX 2: toolchain + ninja paths
      # ----------------------------
      - name: Export toolchain paths
        run: |
          echo "$(brew --prefix llvm@21)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix ninja)/bin" >> "$GITHUB_PATH"

          echo "CC=$(brew --prefix llvm@21)/bin/clang" >> $GITHUB_ENV
          echo "CXX=$(brew --prefix llvm@21)/bin/clang++" >> $GITHUB_ENV

      # ----------------------------
      # Cache (optional but useful)
      # ----------------------------
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/CMakeLists.txt', '**/CMakePresets.json', '**/vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      # ----------------------------
      # Configure (FIXED)
      # ----------------------------
      - name: Configure
        run: |
          cmake --preset Release \
            -B "$BUILD_DIR" \
            -G Ninja \
            -DCMAKE_MAKE_PROGRAM="$(brew --prefix ninja)/bin/ninja" \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DLAGOM_LINK_POOL_SIZE=2

      # ----------------------------
      # Build
      # ----------------------------
      - name: Build
        run: |
          cmake --build "$BUILD_DIR" --parallel

      # ----------------------------
      # Artifact
      # ----------------------------
      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: Ladybird-macOS-arm64
          path: Build/release/bin/Ladybird.app
